<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影像紀事 | 時光紀錄展</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #3498db; --bg-color: #ffffff; --text-main: #2c3e50; --border-color: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); color: var(--text-main); }
        header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); padding: 1.5rem 0; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .nav-content { display: flex; justify-content: space-between; align-items: center; width: 90%; max-width: 1400px; margin: 0 auto; }
        .logo { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; letter-spacing: 3px; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav ul li a { color: var(--text-main); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }

        .page-header { margin-top: 180px; text-align: center; padding-bottom: 80px; }
        .page-header h2 { font-family: 'Noto Serif TC', serif; font-size: 3.5rem; font-weight: 900; }

        .gallery-container { width: 92%; max-width: 1400px; margin: 0 auto 100px; }
        #media-grid { column-count: 3; column-gap: 30px; }
        .media-card { break-inside: avoid; margin-bottom: 50px; background: #fff; border: 1px solid var(--border-color); transition: 0.3s; padding: 15px; }
        .image-wrapper img { width: 100%; height: auto; display: block; }
        
        /* 吐槽留言區 */
        .comment-area { margin-top: 15px; border-top: 1px solid #f9f9f9; padding-top: 15px; }
        .comment-list { list-style: none; font-size: 0.85rem; color: #7f8c8d; max-height: 150px; overflow-y: auto; margin-bottom: 10px; }
        .comment-item { margin-bottom: 5px; padding: 5px; background: #fafafa; border-radius: 4px; }
        .comment-item span { color: var(--primary-color); font-weight: bold; margin-right: 5px; }

        .comment-input-wrap { display: flex; gap: 5px; }
        .comment-input-wrap input { flex: 1; padding: 8px; border: 1px solid var(--border-color); font-size: 0.8rem; border-radius: 4px; outline: none; }
        .comment-input-wrap button { padding: 8px 15px; background: var(--primary-color); color: #fff; border: none; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }

        footer { padding: 100px 0; text-align: center; color: #7f8c8d; }
        @media (max-width: 1000px) { #media-grid { column-count: 2; } }
        @media (max-width: 600px) { #media-grid { column-count: 1; } }
    </style>
</head>
<body>
    <header>
        <div class="nav-content">
            <div class="logo">JOURNAL 2026</div>
            <nav>
                <ul>
                    <li><a href="index.html">首頁</a></li>
                    <li><a href="gallery.html" class="active">影像紀事</a></li>
                    <li><a href="blessings.html">夏日留言</a></li>
                    <li><a href="memorial.html">時光印記</a></li>
                    <li><a href="games.html">趣味互動</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-header">
            <span>Automated Collection</span>
            <h2>影像紀事</h2>
        </div>

        <div class="gallery-container">
            <div id="media-grid">
                <!-- 由 JS 自動讀取 -->
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDocqxQaMDGOUhdAJsV71bse4QC-tjtB-Y",
            authDomain: "bc-project-db.firebaseapp.com",
            projectId: "bc-project-db",
            storageBucket: "bc-project-db.firebasestorage.app",
            messagingSenderId: "999527367804",
            appId: "1:999527367804:web:3ba10b2818ab9fe6aa75f9",
            measurementId: "G-X14MEDWSLR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'bc-project-db';

        // GitHub 資訊
        const username = 'shutiao7321'; 
        const repo = 'BC-project';      
        const folder = 'public';

        async function init() {
            await signInAnonymously(auth);
            fetchPhotos();
        }

        async function fetchPhotos() {
            const grid = document.getElementById('media-grid');
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
                const files = await response.json();
                const photoFiles = files.filter(file => /\.(jpe?g|png|webp|gif)$/i.test(file.name));

                grid.innerHTML = '';
                photoFiles.forEach(file => {
                    const photoId = btoa(file.name).substring(0, 20).replace(/\//g, '_'); // 生成唯一 ID
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    card.innerHTML = `
                        <div class="image-wrapper">
                            <img src="${file.download_url}" alt="${file.name}">
                        </div>
                        <div class="comment-area">
                            <ul class="comment-list" id="list-${photoId}"></ul>
                            <div class="comment-input-wrap">
                                <input type="text" id="input-${photoId}" placeholder="匿名吐槽或留言..." maxlength="30">
                                <button onclick="sendComment('${photoId}')">送出</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                    listenComments(photoId);
                });
            } catch (err) { console.error(err); }
        }

        function listenComments(photoId) {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', `comments_${photoId}`);
            onSnapshot(colRef, (snap) => {
                const list = document.getElementById(`list-${photoId}`);
                if (!list) return;
                const items = [];
                snap.forEach(d => items.push(d.data()));
                items.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                list.innerHTML = items.map(m => `<li class="comment-item"><span>幽靈訪客:</span> ${m.text}</li>`).join('');
                list.scrollTop = list.scrollHeight;
            });
        }

        window.sendComment = async (photoId) => {
            const input = document.getElementById(`input-${photoId}`);
            const text = input.value.trim();
            if (!text) return;
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', `comments_${photoId}`);
                await addDoc(colRef, { text, createdAt: serverTimestamp() });
                input.value = '';
            } catch (e) { console.error(e); }
        };

        init();
    </script>
</body>
</html>
