<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影像紀事 | 時光紀錄展</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #ffffff;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --border-color: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* --- 導覽列 --- */
        header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 1.5rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .logo { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; letter-spacing: 3px; font-weight: 900; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav ul li a { color: var(--text-main); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        nav ul li a:hover, nav ul li a.active { color: var(--primary-color); }

        /* --- 標題區 --- */
        .page-header {
            margin-top: 180px;
            text-align: center;
            padding-bottom: 60px;
        }
        .page-header span {
            font-size: 0.8rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 6px;
            display: block;
            margin-bottom: 15px;
        }
        .page-header h2 {
            font-family: 'Noto Serif TC', serif;
            font-size: 3.5rem;
            font-weight: 900;
        }

        /* --- 瀑布流容器 --- */
        .gallery-container {
            width: 92%;
            max-width: 1400px;
            margin: 0 auto 120px;
        }

        /* 核心瀑布流語法 */
        #media-grid {
            column-count: 3; /* 預設 3 欄 */
            column-gap: 25px;
            width: 100%;
        }

        .media-card {
            break-inside: avoid; /* 防止卡片被截斷到下一欄 */
            margin-bottom: 25px;
            background: #fff;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            position: relative;
        }

        .media-card:hover {
            transform: translateY(-5px);
        }

        .image-wrapper {
            width: 100%;
            position: relative;
            background: #f9f9f9;
        }

        .image-wrapper img {
            width: 100%;
            height: auto; /* 高度自動，不裁切 */
            display: block;
            transition: 0.5s;
        }

        .media-card:hover .image-wrapper img {
            filter: brightness(0.9);
        }

        .card-info {
            padding: 15px 5px;
            text-align: left;
        }
        .card-info h4 {
            font-family: 'Noto Serif TC', serif;
            font-size: 1rem;
            color: var(--text-main);
            font-weight: 600;
        }
        .card-info p {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* --- 燈箱 (Lightbox) --- */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            cursor: zoom-out;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 85%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }
        .lightbox-info {
            position: absolute;
            bottom: 40px;
            text-align: center;
            font-family: 'Noto Serif TC', serif;
        }

        /* --- 載入狀態 --- */
        .loader {
            text-align: center;
            padding: 100px 0;
            font-size: 1.1rem;
            color: var(--text-light);
            letter-spacing: 2px;
            width: 100%;
        }

        footer {
            padding: 100px 0;
            background-color: #fafafa;
            text-align: center;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        /* 響應式：手機與平板 */
        @media (max-width: 1000px) {
            #media-grid { column-count: 2; }
        }
        @media (max-width: 600px) {
            #media-grid { column-count: 1; }
            .page-header h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-content">
            <div class="logo">JOURNAL 2026</div>
            <nav>
                <ul>
                    <li><a href="index.html">首頁</a></li>
                    <li><a href="gallery.html" class="active">影像紀事</a></li>
                    <li><a href="blessings.html">夏日留言</a></li>
                    <li><a href="memorial.html">時光印記</a></li>
                    <li><a href="games.html">趣味互動</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 燈箱結構 -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Full view">
        <div class="lightbox-info">
            <h4 id="lightbox-title"></h4>
        </div>
    </div>

    <main>
        <div class="page-header">
            <span>The Collection</span>
            <h2>影像紀事</h2>
        </div>

        <div class="gallery-container">
            <div id="media-grid">
                <div class="loader">正在讀取影像...</div>
            </div>
        </div>
    </main>

    <footer>
        <p>Created for the memories that last forever | 2026 JOURNAL</p>
    </footer>

    <script>
        // --- GitHub API 設定 ---
        const username = 'shutiao7321'; 
        const repo = 'BC-project';      
        const folder = 'public';        

        async function fetchPhotos() {
            const grid = document.getElementById('media-grid');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
                const files = await response.json();

                grid.innerHTML = '';

                // 排除並非圖片的檔案
                const photoFiles = files.filter(file => 
                    /\.(jpe?g|png|webp|gif)$/i.test(file.name)
                );

                if (photoFiles.length === 0) {
                    grid.innerHTML = '<div class="loader">資料夾內尚未發現影像。</div>';
                    return;
                }

                photoFiles.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    // 點擊卡片開啟燈箱
                    card.onclick = () => openLightbox(file.download_url, file.name);
                    
                    card.innerHTML = `
                        <div class="image-wrapper">
                            <img src="${file.download_url}" alt="${file.name}" loading="lazy">
                        </div>
                        <div class="card-info">
                            <h4>影像紀錄</h4>
                            <p>${file.name}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error('Fetch error:', error);
                grid.innerHTML = '<div class="loader">連線異常，請確認 Repository 權限。</div>';
            }
        }

        // --- 燈箱邏輯 ---
        function openLightbox(url, title) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            const lbTitle = document.getElementById('lightbox-title');
            
            lbImg.src = url;
            lbTitle.innerText = title;
            lb.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // 防止底層捲動
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // 執行
        fetchPhotos();
    </script>
</body>
</html>
