<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味互動 | 時光紀錄展</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #ffffff;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --border-color: #f0f0f0;
            --accent-bg: #fafafa;
            --gold: #f1c40f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* --- 導覽列 --- */
        header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 1.5rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .logo { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; letter-spacing: 3px; font-weight: 900; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav ul li a { color: var(--text-main); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        nav ul li a:hover, nav ul li a.active { color: var(--primary-color); }

        /* --- 展覽標題區 --- */
        .page-header {
            margin-top: 180px;
            text-align: center;
            padding-bottom: 60px;
            position: relative;
        }
        .page-header::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 60px;
            background: var(--primary-color);
        }
        .page-header span {
            font-size: 0.8rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 6px;
            display: block;
            margin-bottom: 15px;
        }
        .page-header h2 {
            font-family: 'Noto Serif TC', serif;
            font-size: 3.5rem;
            font-weight: 900;
        }

        /* --- 遊戲主展區 --- */
        .game-hub {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto 100px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 50px;
        }

        /* 遊戲區域 */
        .exhibit-frame {
            background: var(--accent-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            text-align: center;
            position: relative;
        }
        .exhibit-info {
            text-align: left;
            margin-bottom: 30px;
            border-left: 3px solid var(--primary-color);
            padding-left: 20px;
        }
        .exhibit-info h3 { font-family: 'Noto Serif TC', serif; font-size: 1.8rem; margin-bottom: 5px; }
        .exhibit-info p { color: var(--text-light); font-size: 0.9rem; }

        .score-display {
            font-family: 'Noto Serif TC', serif;
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary-color);
            margin: 20px 0;
        }

        #pop-container {
            width: 280px;
            height: 400px;
            margin: 0 auto;
            cursor: pointer;
            background: white;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #pop-container:active { transform: scale(0.98); border-color: var(--primary-color); }
        #pop-img { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none; }

        /* 排行榜區域 */
        .leaderboard-section {
            background: white;
            border: 1px solid var(--border-color);
            padding: 30px;
        }
        .leaderboard-section h3 {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.4rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .leaderboard-list { list-style: none; }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dotted var(--border-color);
            font-size: 0.95rem;
        }
        .rank { font-weight: bold; color: var(--primary-color); margin-right: 10px; font-family: 'Noto Serif TC', serif; }

        /* 暱稱視窗 */
        .modal {
            position: fixed; inset: 0; background: rgba(255,255,255,0.95);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            width: 90%; max-width: 400px; text-align: center;
        }
        .modal-content h3 { font-family: 'Noto Serif TC', serif; font-size: 2rem; margin-bottom: 20px; }
        .modal-content input {
            width: 100%; padding: 15px; border: 1px solid var(--border-color);
            border-radius: 0; margin-bottom: 20px; font-family: inherit; font-size: 1rem; text-align: center;
        }
        .start-btn {
            width: 100%; padding: 15px; background: var(--text-main); color: white;
            border: none; cursor: pointer; font-weight: 700; letter-spacing: 2px;
        }

        /* 頁尾 */
        footer {
            padding: 80px 0;
            background-color: var(--accent-bg);
            text-align: center;
            color: var(--text-light);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        @media (max-width: 900px) {
            .game-hub { grid-template-columns: 1fr; }
            .page-header h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- 暱稱輸入 -->
    <div id="name-modal" class="modal">
        <div class="modal-content">
            <span>Entry 04</span>
            <h3>登錄趣味互動展</h3>
            <p style="color:var(--text-light); margin-bottom:20px;">請輸入您的暱稱以同步數據</p>
            <input type="text" id="nickname-input" placeholder="您的稱呼" maxlength="15">
            <button class="start-btn" onclick="startApp()">開始互動</button>
            <p id="error-msg" style="color: red; font-size: 0.8rem; margin-top: 10px; display: none;">請輸入暱稱後再開始</p>
        </div>
    </div>

    <header>
        <div class="nav-content">
            <div class="logo">JOURNAL 2026</div>
            <nav>
                <ul>
                    <li><a href="index.html">首頁</a></li>
                    <li><a href="gallery.html">影像紀事</a></li>
                    <li><a href="blessings.html">夏日留言</a></li>
                    <li><a href="memorial.html">時光印記</a></li>
                    <li><a href="games.html" class="active">趣味互動</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-header">
            <span>Part 04</span>
            <h2>趣味互動</h2>
        </div>

        <section class="game-hub">
            <div class="exhibit-frame">
                <div class="exhibit-info">
                    <h3>展位 A：Pop-Dance</h3>
                    <p>透過點擊與畫中的人物互動，在輕快的節奏中釋放壓力。</p>
                </div>
                
                <div class="score-display" id="score">0</div>
                
                <div id="pop-container">
                    <!-- 修正路徑：移除了 public/，改為直接讀取根目錄 -->
                    <img id="pop-img" src="images/games/friend1.jpg" onerror="this.src='https://api.dicebear.com/7.x/fun-emoji/svg?seed=1'" alt="Pop!">
                </div>
                
                <p style="margin-top:20px; color:var(--text-light); font-size:0.85rem; letter-spacing:1px;">
                    TIP: 瘋狂點擊學長姐，同步至雲端排行榜
                </p>
            </div>

            <div class="leaderboard-section">
                <h3>🏆 舞王排行榜</h3>
                <ul id="leaderboard-list" class="leaderboard-list">
                    <li style="text-align:center; padding:20px; color:var(--text-light);">正在連線雲端...</li>
                </ul>
            </div>
        </section>
    </main>

    <audio id="pop-sound" src="https://www.soundjay.com/buttons/sounds/button-37.mp3"></audio>

    <footer>
        <p>Created for the memories that last forever | 2026 JOURNAL</p>
    </footer>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDocqxQaMDGOUhdAJsV71bse4QC-tjtB-Y",
            authDomain: "bc-project-db.firebaseapp.com",
            projectId: "bc-project-db",
            storageBucket: "bc-project-db.firebasestorage.app",
            messagingSenderId: "999527367804",
            appId: "1:999527367804:web:3ba10b2818ab9fe6aa75f9",
            measurementId: "G-X14MEDWSLR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'bc-project-db';

        let user = null, nickname = "", localScore = 0;
        const popImg = document.getElementById('pop-img');
        const scoreDisplay = document.getElementById('score');
        const listContainer = document.getElementById('leaderboard-list');

        // 設定圖片路徑（根目錄）
        const img_normal = "images/games/friend1.jpg";
        const img_active = "images/games/friend2.jpg";

        window.startApp = async () => {
            const input = document.getElementById('nickname-input').value.trim();
            if (!input) {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }
            nickname = input;
            document.getElementById('name-modal').style.display = 'none';
            try { await signInAnonymously(auth); } catch (err) { console.error(err); }
        };

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                loadScore();
                listenLeaderboard();
            }
        });

        const loadScore = async () => {
            if (!user) return;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'popdance', user.uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                localScore = snap.data().score || 0;
                scoreDisplay.innerText = localScore;
            }
        };

        const listenLeaderboard = () => {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'popdance');
            onSnapshot(colRef, (snap) => {
                const data = [];
                snap.forEach(d => data.push(d.data()));
                data.sort((a, b) => (b.score || 0) - (a.score || 0));
                renderLeaderboard(data.slice(0, 10));
            });
        };

        const renderLeaderboard = (top) => {
            listContainer.innerHTML = top.map((u, i) => `
                <li class="leaderboard-item">
                    <span><span class="rank">#${i+1}</span> ${u.nickname || '匿名'}</span>
                    <span>${u.score || 0}</span>
                </li>
            `).join('') || '<li style="text-align:center;padding:20px;">尚無紀錄</li>';
        };

        let syncTimer = null;
        function pop() {
            localScore++;
            scoreDisplay.innerText = localScore;
            popImg.src = img_active; // 修正路徑
            document.getElementById('pop-sound').currentTime = 0;
            document.getElementById('pop-sound').play().catch(()=>{});

            if (user && nickname) {
                clearTimeout(syncTimer);
                syncTimer = setTimeout(async () => {
                    const ref = doc(db, 'artifacts', appId, 'public', 'data', 'popdance', user.uid);
                    await setDoc(ref, { nickname, score: localScore, updatedAt: Date.now() }, { merge: true });
                }, 1500);
            }
        }

        const container = document.getElementById('pop-container');
        container.addEventListener('mousedown', (e) => { if(e.button === 0) pop(); });
        window.addEventListener('mouseup', () => popImg.src = img_normal); // 修正路徑
        container.addEventListener('touchstart', (e) => { e.preventDefault(); pop(); });
        container.addEventListener('touchend', (e) => { e.preventDefault(); popImg.src = img_normal; });

    </script>
</body>
</html>
