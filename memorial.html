<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時光印記 | 時光紀錄展</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #ffffff;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --border-color: #f0f0f0;
            --accent-bg: #fafafa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* --- 導覽列 --- */
        header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 1.5rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .logo { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; letter-spacing: 3px; font-weight: 900; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav ul li a { color: var(--text-main); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        nav ul li a:hover, nav ul li a.active { color: var(--primary-color); }

        /* --- 展覽標題區 --- */
        .page-header {
            margin-top: 180px;
            text-align: center;
            padding-bottom: 60px;
            position: relative;
        }
        .page-header::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 60px;
            background: var(--primary-color);
        }
        .page-header span {
            font-size: 0.8rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 6px;
            display: block;
            margin-bottom: 15px;
        }
        .page-header h2 {
            font-family: 'Noto Serif TC', serif;
            font-size: 3.5rem;
            font-weight: 900;
        }

        /* --- 編輯器佈局 --- */
        .editor-container {
            width: 90%;
            max-width: 1300px;
            margin: 0 auto 100px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 50px;
            align-items: start;
        }

        .controls {
            background: var(--accent-bg);
            padding: 30px;
            border: 1px solid var(--border-color);
        }
        .control-group { margin-bottom: 25px; }
        .control-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            background: white;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary-color); }

        .image-picker {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .img-option {
            aspect-ratio: 1;
            background: #eee;
            cursor: pointer;
            border: 2px solid transparent;
            background-size: cover;
            background-position: center;
        }
        .img-option.active { border-color: var(--primary-color); }

        /* 預覽區域 */
        .preview-area {
            text-align: center;
            position: sticky;
            top: 120px;
        }
        #postcard-canvas {
            max-width: 100%;
            height: auto;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }
        .download-btn {
            margin-top: 30px;
            width: 100%;
            padding: 20px;
            background: var(--text-main);
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Noto Serif TC', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .download-btn:hover { background: var(--primary-color); transform: translateY(-3px); }

        footer {
            padding: 100px 0;
            background-color: var(--accent-bg);
            text-align: center;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 1000px) {
            .editor-container { grid-template-columns: 1fr; }
            .preview-area { position: static; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-content">
            <div class="logo">JOURNAL 2026</div>
            <nav>
                <ul>
                    <li><a href="index.html">首頁</a></li>
                    <li><a href="gallery.html">影像紀事</a></li>
                    <li><a href="blessings.html">夏日留言</a></li>
                    <li><a href="memorial.html" class="active">時光印記</a></li>
                    <li><a href="games.html">趣味互動</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-header">
            <span>Part 03</span>
            <h2>時光印記</h2>
        </div>

        <section class="editor-container">
            <!-- 左側控制項 -->
            <div class="controls">
                <div class="control-group">
                    <label>選擇背景底圖</label>
                    <div class="image-picker" id="image-picker">
                        <div class="img-option active" style="background-color: #f9f9f9;" onclick="setBg(null, this)"></div>
                        <!-- 這些圖片路徑指向你的 public 資料夾 -->
                        <div class="img-option" style="background-image: url('public/campus.jpg');" onclick="setBg('public/campus.jpg', this)"></div>
                        <div class="img-option" style="background-image: url('public/ceremony.jpg');" onclick="setBg('public/ceremony.jpg', this)"></div>
                        <div class="img-option" style="background-image: url('public/friend1.jpg');" onclick="setBg('public/friend1.jpg', this)"></div>
                    </div>
                </div>

                <div class="control-group">
                    <label>致學長姐</label>
                    <input type="text" id="inp-to" placeholder="例：親愛的 某某學長" value="親愛的學長姐" oninput="draw()">
                </div>

                <div class="control-group">
                    <label>心意文字</label>
                    <textarea id="inp-msg" rows="5" oninput="draw()">鵬程萬里，前程似錦。
感謝這段時光有你們的引領，
願我們在未來的頂峰相見。</textarea>
                </div>

                <div class="control-group">
                    <label>署名</label>
                    <input type="text" id="inp-from" placeholder="例：資工系學弟妹 敬上" value="學弟妹全體 敬上" oninput="draw()">
                </div>
            </div>

            <!-- 右側預覽 -->
            <div class="preview-area">
                <canvas id="postcard-canvas" width="1000" height="700"></canvas>
                <button class="download-btn" onclick="download()">💾 保存這段記憶 (.png)</button>
                <p style="margin-top: 15px; font-size: 0.85rem; color: var(--text-light);">
                    建議使用電腦瀏覽器進行下載以獲得最佳解析度
                </p>
            </div>
        </section>
    </main>

    <footer>
        <p>Created for the memories that last forever | 2026 JOURNAL</p>
    </footer>

    <script>
        const canvas = document.getElementById('postcard-canvas');
        const ctx = canvas.getContext('2d');
        let bgImg = null;

        function setBg(url, el) {
            document.querySelectorAll('.img-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');

            if (!url) {
                bgImg = null;
                draw();
            } else {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = url;
                img.onload = () => {
                    bgImg = img;
                    draw();
                };
            }
        }

        function draw() {
            const to = document.getElementById('inp-to').value;
            const msg = document.getElementById('inp-msg').value;
            const from = document.getElementById('inp-from').value;

            // 1. 清除畫布
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 繪製背景
            if (bgImg) {
                // 繪製圖片並加上半透明遮罩
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 3. 繪製邊框與裝飾
            ctx.strokeStyle = "#2c3e50";
            ctx.lineWidth = 1;
            ctx.strokeRect(40, 40, canvas.width - 80, canvas.height - 80);

            // 繪製「郵票」裝飾
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(canvas.width - 180, 80, 100, 130);
            ctx.setLineDash([]);
            ctx.font = 'bold 16px "Noto Sans TC"';
            ctx.fillStyle = "#2c3e50";
            ctx.fillText("2026", canvas.width - 150, 150);

            // 4. 文字內容
            ctx.fillStyle = "#2c3e50";
            
            // To:
            ctx.font = '900 32px "Noto Serif TC"';
            ctx.fillText(to, 80, 120);

            // Message:
            ctx.font = '300 28px "Noto Sans TC"';
            const lines = msg.split('\n');
            lines.forEach((line, i) => {
                ctx.fillText(line, 80, 220 + (i * 45));
            });

            // From:
            ctx.font = '700 30px "Noto Serif TC"';
            ctx.textAlign = 'right';
            ctx.fillText(from, canvas.width - 100, canvas.height - 120);
            ctx.textAlign = 'left';

            // 5. 展覽浮水印裝飾
            ctx.font = '900 14px "Noto Sans TC"';
            ctx.fillStyle = "rgba(52, 152, 219, 0.5)";
            ctx.fillText("THE EXHIBITION OF MEMORIES : JOURNAL 2026", 80, canvas.width < 768 ? canvas.height - 60 : canvas.height - 60);
        }

        function download() {
            const link = document.createElement('a');
            link.download = `時光印記-2026.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        // 初始繪製
        window.onload = () => {
            // 載入字體後再繪製以確保位置正確
            document.fonts.ready.then(() => {
                draw();
            });
        };
    </script>
</body>
</html>
